name: Daily Risk Data Collection

on:
  schedule:
    # 每天 UTC 0點 (台灣早上8點) 執行
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  collect-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install pandas yfinance requests
          
      - name: Collect today's data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import pandas as pd
          import yfinance as yf
          import requests
          import re
          from datetime import datetime
          import os

          CSV_FILE = "risk_history.csv"
          WEIGHTS = {'vix': 0.25, 'fear_greed': 0.20, 'credit_spread': 0.25, 'dollar': 0.15, 'usd_jpy': 0.15}

          def calculate_risk_score(vix, credit, fear_greed, dxy, jpy):
              # VIX scoring
              if vix < 15: vix_score = 100 - vix * 4
              elif vix < 25: vix_score = 60 - (vix - 15) * 2
              elif vix < 35: vix_score = 40 - (vix - 25) * 4
              else: vix_score = max(0, 20 - (vix - 35) * 2)
              
              # Fear/Greed scoring
              fg_score = fear_greed
              
              # Credit spread scoring
              if credit: 
                  if credit < 2: cs_score = 100 - credit * 20
                  elif credit < 3: cs_score = 60 - (credit - 2) * 20
                  elif credit < 4: cs_score = 40 - (credit - 3) * 20
                  else: cs_score = max(0, 20 - (credit - 4) * 10)
              else:
                  cs_score = 50
              
              # Dollar scoring
              if dxy < 100: dxy_score = 100 - dxy
              elif dxy < 105: dxy_score = 50 - (dxy - 100) * 2
              elif dxy < 110: dxy_score = 40 - (dxy - 105) * 4
              else: dxy_score = max(0, 20 - (dxy - 110) * 2)
              
              # USD/JPY scoring
              if jpy < 130: jpy_score = 100 - (130 - jpy) * 0.5
              elif jpy < 145: jpy_score = 50
              elif jpy < 160: jpy_score = 40 - (jpy - 145) * 2
              else: jpy_score = max(0, 20 - (jpy - 160) * 2)
              
              total = (vix_score * WEIGHTS['vix'] + fg_score * WEIGHTS['fear_greed'] + 
                      cs_score * WEIGHTS['credit_spread'] + dxy_score * WEIGHTS['dollar'] + 
                      jpy_score * WEIGHTS['usd_jpy'])
              
              return {
                  'vix': vix_score,
                  'fear_greed': fg_score,
                  'credit_spread': cs_score,
                  'dollar': dxy_score,
                  'usd_jpy': jpy_score,
                  'total': total
              }

          # Get VIX
          vix = yf.download("^VIX", progress=False)
          latest_vix = float(vix['Close'].iloc[-1]) if len(vix) > 0 else 18

          # Get Fear/Greed
          fear_greed = 50
          try:
              headers = {'User-Agent': 'Mozilla/5.0'}
              resp = requests.get("https://feargreedmeter.com/", headers=headers, timeout=10)
              if resp.status_code == 200:
                  match = re.search(r'>(\d+)<.*?fear.*?greed', resp.text, re.IGNORECASE)
                  if match:
                      fear_greed = int(match.group(1))
          except:
              pass

          # Get Credit Spread
          credit_spread = 3.0
          try:
              credit_df = pd.read_csv("https://fred.stlouisfed.org/graph/fredgraph.csv?id=BAMLH0A0HYM2")
              if len(credit_df) > 0:
                  credit_spread = float(credit_df['BAMLH0A0HYM2'].iloc[-1])
          except:
              pass

          # Get DXY
          dxy = yf.download("DX-Y.NYB", progress=False)
          latest_dxy = float(dxy['Close'].iloc[-1]) if len(dxy) > 0 else 100

          # Get USD/JPY
          jpy = yf.download("JPY=X", progress=False)
          latest_jpy = float(jpy['Close'].iloc[-1]) if len(jpy) > 0 else 150

          # Calculate risk
          risk = calculate_risk_score(latest_vix, credit_spread, fear_greed, latest_dxy, latest_jpy)

          # Save to CSV
          today = datetime.now().strftime('%Y-%m-%d')
          
          if os.path.exists(CSV_FILE):
              df = pd.read_csv(CSV_FILE)
              df['date'] = pd.to_datetime(df['date']).dt.strftime('%Y-%m-%d')
              if today in df['date'].values:
                  df.loc[df['date'] == today] = [today, latest_vix, fear_greed, credit_spread, latest_dxy, latest_jpy, risk['total']]
              else:
                  df = pd.concat([df, pd.DataFrame([{
                      'date': today, 'vix': latest_vix, 'fear_greed': fear_greed,
                      'credit_spread': credit_spread, 'dxy': latest_dxy, 
                      'usd_jpy': latest_jpy, 'risk_index': risk['total']
                  }])], ignore_index=True)
          else:
              df = pd.DataFrame([{
                  'date': today, 'vix': latest_vix, 'fear_greed': fear_greed,
                  'credit_spread': credit_spread, 'dxy': latest_dxy, 
                  'usd_jpy': latest_jpy, 'risk_index': risk['total']
              }])
          
          df.to_csv(CSV_FILE, index=False)
          print(f"Saved: {today} VIX={latest_vix} FG={fear_greed} Risk={risk['total']:.1f}")
          EOF

      - name: Commit and push
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add risk_history.csv
          git diff --staged --quiet || git commit -m "Update risk history $(date +%Y-%m-%d)"
          git push
